<!DOCTYPE HTML>
<html>
  <head>
    <title>Admin - Ishrak Latif</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
      #admin-login, #admin-panel { max-width: 800px; margin: 0 auto; }
      .form-group { margin-bottom: 1.5em; }
      .form-group label { display: block; margin-bottom: 0.5em; color: #333 !important; font-size: 0.9em; font-weight: 600; }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100% !important; padding: 0.75em 1em !important;
        background: #fff !important;
        border: 1px solid #ccc !important;
        border-radius: 6px !important; color: #222 !important;
        font-size: 0.9em !important; font-family: inherit !important;
      }
      .form-group input::placeholder,
      .form-group textarea::placeholder { color: #aaa !important; }
      .form-group textarea { min-height: 300px !important; resize: vertical; line-height: 1.6; }
      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none !important; border-color: #D97757 !important; box-shadow: 0 0 0 2px rgba(217,119,87,0.15) !important;
      }
      .hint { font-size: 0.75em; color: #888; margin-top: 0.3em; }
      .msg-success { color: #166534; padding: 1em; background: #dcfce7; border-radius: 6px; margin-bottom: 1em; border: 1px solid #bbf7d0; }
      .msg-error { color: #991b1b; padding: 1em; background: #fee2e2; border-radius: 6px; margin-bottom: 1em; border: 1px solid #fecaca; }
      .posts-list { margin-top: 2em; }
      .post-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 1em; background: #f9f9f9;
        border-radius: 6px; margin-bottom: 0.75em;
        border: 1px solid #e5e5e5;
      }
      .post-item-title { font-weight: 600; color: #222; }
      .post-item-meta { font-size: 0.8em; color: #666; margin-top: 0.2em; }
      .delete-btn {
        background: #fee2e2 !important;
        border: 1px solid #f87171 !important;
        color: #991b1b !important;
        padding: 0.4em 0.8em !important;
        font-size: 0.8em !important;
        cursor: pointer; border-radius: 4px;
        transition: background 0.15s;
      }
      .edit-btn {
        background: #dbeafe !important;
        border: 1px solid #93c5fd !important;
        color: #1e40af !important;
        padding: 0.4em 0.8em !important;
        font-size: 0.8em !important;
        cursor: pointer; border-radius: 4px;
        transition: background 0.15s;
      }
      .edit-btn:hover { background: #bfdbfe !important; }
      .tab-btns { display: flex; gap: 1em; margin-bottom: 2em; }
      .tab-btn {
        padding: 0.6em 1.5em; border-radius: 6px; cursor: pointer;
        background: #f3f3f3; border: 1px solid #ddd;
        color: #444; font-size: 0.9em;
      }
      .tab-btn.active { background: #D97757 !important; border-color: #D97757 !important; color: white !important; }
      .tab-content { display: none; }
      .tab-content.active { display: block; }
      #login-error { color: #991b1b; margin-top: 0.5em; font-size: 0.85em; }
    </style>
  </head>
  <body class="is-preload">
    <div id="wrapper" class="fade-in">

      <header id="header">
        <a href="index.html" class="logo">Portfolio</a>
      </header>

      <nav id="nav">
        <ul class="links">
          <li><a href="index.html">Projects</a></li>
          <li><a href="assets/res2.pdf" target="_blank">Resume</a></li>
          <li><a href="blog.html">Blog</a></li>
        </ul>
      </nav>

      <div id="main">

        <!-- Login Gate -->
        <div id="admin-login">
          <header class="major">
            <h1>Admin</h1>
            <p>Enter your blog password to continue.</p>
          </header>
          <div class="form-group">
            <input type="password" id="login-password" placeholder="Password" />
            <div id="login-error"></div>
          </div>
          <button class="button primary" onclick="doLogin()">Login</button>
        </div>

        <!-- Admin Panel (hidden until login) -->
        <div id="admin-panel" style="display:none">
          <header class="major">
            <h1>Blog Admin</h1>
          </header>

          <div class="tab-btns">
            <button class="tab-btn active" onclick="switchTab('new')">New Post</button>
            <button class="tab-btn" onclick="switchTab('manage')">Manage Posts</button>
          </div>

          <!-- New Post Tab -->
          <div id="tab-new" class="tab-content active">
            <div id="post-msg"></div>
            <div class="form-group">
              <label>Title *</label>
              <input type="text" id="post-title" placeholder="My Post Title" />
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="post-category">
                <option value="general">General</option>
                <option value="technical">Technical</option>
                <option value="research">Research</option>
                <option value="project">Project Deep Dive</option>
                <option value="personal">Personal</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tags <span class="hint">(comma separated)</span></label>
              <input type="text" id="post-tags" placeholder="AI, Python, NLP" />
            </div>
            <div class="form-group">
              <label>Excerpt <span class="hint">(optional — auto-generated from content if blank)</span></label>
              <input type="text" id="post-excerpt" placeholder="Short summary shown on blog listing..." />
            </div>
            <div class="form-group">
              <label>Content * <span class="hint">(supports **bold**, *italic*, # headings, `code`, > blockquote, - lists)</span></label>
              <textarea id="post-content" placeholder="Write your post here...&#10;&#10;## Introduction&#10;&#10;Your content here..."></textarea>
            </div>
            <button class="button primary" onclick="submitPost()">Publish Post</button>
          </div>

          <!-- Manage Posts Tab -->
          <div id="tab-manage" class="tab-content">
            <div id="manage-msg"></div>
            <div id="posts-list">
              <p style="color:#aaa">Loading posts...</p>
            </div>
          </div>

          <!-- Edit Modal -->
          <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; overflow-y:auto;">
            <div style="background:#fff; max-width:800px; margin:2em auto; padding:2em; border-radius:8px; position:relative;">
              <button onclick="closeEdit()" style="position:absolute; top:1em; right:1em; background:none; border:none; font-size:1.5em; cursor:pointer; color:#666;">✕</button>
              <h2 style="margin-top:0; color:#222;">Edit Post</h2>
              <input type="hidden" id="edit-id" />
              <div class="form-group">
                <label>Title *</label>
                <input type="text" id="edit-title" />
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="edit-category">
                  <option value="general">General</option>
                  <option value="technical">Technical</option>
                  <option value="research">Research</option>
                  <option value="project">Project Deep Dive</option>
                  <option value="personal">Personal</option>
                </select>
              </div>
              <div class="form-group">
                <label>Tags <span class="hint">(comma separated)</span></label>
                <input type="text" id="edit-tags" />
              </div>
              <div class="form-group">
                <label>Excerpt</label>
                <input type="text" id="edit-excerpt" />
              </div>
              <div class="form-group">
                <label>Content *</label>
                <textarea id="edit-content"></textarea>
              </div>
              <div id="edit-msg"></div>
              <button class="button primary" onclick="saveEdit()">Save Changes</button>
              <button class="button" onclick="closeEdit()" style="margin-left:1em;">Cancel</button>
            </div>
          </div>

        </div>
      </div>

      <div id="copyright">
        <ul><li>&copy; IL</li><li>Design: <a href="https://html5up.net">HTML5 UP</a></li></ul>
      </div>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
      const BACKEND = "https://portfolio-chatbot-backend-icy-fog-6801.fly.dev";
      let adminPassword = "";

      function doLogin() {
        const pw = document.getElementById("login-password").value;
        if (!pw) return;
        adminPassword = pw;
        document.getElementById("admin-login").style.display = "none";
        document.getElementById("admin-panel").style.display = "block";
        loadManagePosts();
      }

      document.getElementById("login-password").addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
      });

      function switchTab(tab) {
        document.querySelectorAll(".tab-btn").forEach((b, i) => {
          b.classList.toggle("active", (i === 0 && tab === "new") || (i === 1 && tab === "manage"));
        });
        document.getElementById("tab-new").classList.toggle("active", tab === "new");
        document.getElementById("tab-manage").classList.toggle("active", tab === "manage");
        if (tab === "manage") loadManagePosts();
      }

      function showMsg(elId, text, isError = false) {
        const el = document.getElementById(elId);
        el.className = isError ? "msg-error" : "msg-success";
        el.textContent = text;
        setTimeout(() => el.textContent = "", 4000);
      }

      async function submitPost() {
        const title   = document.getElementById("post-title").value.trim();
        const content = document.getElementById("post-content").value.trim();
        const category = document.getElementById("post-category").value;
        const excerpt  = document.getElementById("post-excerpt").value.trim();
        const tagsRaw  = document.getElementById("post-tags").value.trim();
        const tags     = tagsRaw ? tagsRaw.split(",").map(t => t.trim()).filter(Boolean) : [];

        if (!title || !content) {
          showMsg("post-msg", "Title and content are required.", true);
          return;
        }

        try {
          const res = await fetch(`${BACKEND}/posts`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, content, category, excerpt, tags, password: adminPassword })
          });

          if (res.status === 401) {
            showMsg("post-msg", "Wrong password.", true);
            return;
          }
          if (!res.ok) throw new Error(await res.text());

          showMsg("post-msg", "Post published successfully!");
          document.getElementById("post-title").value = "";
          document.getElementById("post-content").value = "";
          document.getElementById("post-excerpt").value = "";
          document.getElementById("post-tags").value = "";
        } catch (err) {
          showMsg("post-msg", "Failed to publish: " + err.message, true);
        }
      }

      async function loadManagePosts() {
        const container = document.getElementById("posts-list");
        try {
          const res = await fetch(`${BACKEND}/posts`);
          const posts = await res.json();

          if (!posts.length) {
            container.innerHTML = "<p style='color:#aaa'>No posts yet.</p>";
            return;
          }

          container.innerHTML = posts.map(post => `
            <div class="post-item">
              <div>
                <div class="post-item-title">${post.title}</div>
                <div class="post-item-meta">${post.category} · ${new Date(post.created_at).toLocaleDateString("en-AU")}</div>
              </div>
              <div style="display:flex; gap:0.5em;">
                <button class="edit-btn" onclick="openEdit('${post.id}')">Edit</button>
                <button class="delete-btn" onclick="deletePost('${post.id}', '${post.title.replace(/'/g, "\\'")}')">Delete</button>
              </div>
            </div>
          `).join("");
        } catch (err) {
          container.innerHTML = "<p style='color:#F87171'>Failed to load posts.</p>";
        }
      }

      async function deletePost(id, title) {
        if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
        try {
          const res = await fetch(`${BACKEND}/posts/${id}`, {
            method: "DELETE",
            headers: { "x-blog-password": adminPassword }
          });
          if (res.status === 401) { showMsg("manage-msg", "Wrong password.", true); return; }
          if (!res.ok) throw new Error();
          showMsg("manage-msg", "Post deleted.");
          loadManagePosts();
        } catch {
          showMsg("manage-msg", "Failed to delete post.", true);
        }
      }
      async function openEdit(id) {
        // Fetch full post by id
        const res = await fetch(`${BACKEND}/posts`);
        const posts = await res.json();
        const post = posts.find(p => p.id === id);
        if (!post) return;

        // Fetch full content via slug
        const res2 = await fetch(`${BACKEND}/posts/${post.slug}`);
        const full = await res2.json();

        document.getElementById("edit-id").value = full.id;
        document.getElementById("edit-title").value = full.title;
        document.getElementById("edit-content").value = full.content;
        document.getElementById("edit-excerpt").value = full.excerpt || "";
        document.getElementById("edit-tags").value = (full.tags || []).join(", ");
        document.getElementById("edit-category").value = full.category || "general";
        document.getElementById("edit-modal").style.display = "block";
      }

      function closeEdit() {
        document.getElementById("edit-modal").style.display = "none";
        document.getElementById("edit-msg").textContent = "";
      }

      async function saveEdit() {
        const id      = document.getElementById("edit-id").value;
        const title   = document.getElementById("edit-title").value.trim();
        const content = document.getElementById("edit-content").value.trim();
        const excerpt = document.getElementById("edit-excerpt").value.trim();
        const category = document.getElementById("edit-category").value;
        const tagsRaw = document.getElementById("edit-tags").value.trim();
        const tags    = tagsRaw ? tagsRaw.split(",").map(t => t.trim()).filter(Boolean) : [];

        if (!title || !content) {
          showMsg("edit-msg", "Title and content are required.", true);
          return;
        }

        try {
          const res = await fetch(`${BACKEND}/posts/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, content, excerpt, category, tags, password: adminPassword })
          });
          if (res.status === 401) { showMsg("edit-msg", "Wrong password.", true); return; }
          if (!res.ok) throw new Error(await res.text());
          closeEdit();
          showMsg("manage-msg", "Post updated successfully!");
          loadManagePosts();
        } catch (err) {
          showMsg("edit-msg", "Failed to save: " + err.message, true);
        }
      }
    </script>
  </body>
</html>
