<!DOCTYPE HTML>
<html>
  <head>
    <title>Blog - Ishrak Latif</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
      .post-card { margin-bottom: 2em; }
      .post-meta { font-size: 0.85em; color: #aaa; margin-bottom: 0.5em; }
      .post-tag {
        display: inline-block; background: rgba(255,255,255,0.1);
        border-radius: 4px; padding: 2px 8px; font-size: 0.75em;
        margin-right: 4px; margin-bottom: 4px;
      }
      .post-category {
        color: #D97757; font-size: 0.8em;
        text-transform: uppercase; letter-spacing: 0.05em;
      }
      .no-posts { text-align: center; padding: 3em; color: #aaa; }
      .loading { text-align: center; padding: 3em; color: #aaa; }
    </style>
  </head>
  <body class="is-preload">
    <div id="wrapper" class="fade-in">

      <header id="header">
        <a href="index.html" class="logo">Portfolio</a>
      </header>

      <nav id="nav">
        <ul class="links">
          <li><a href="index.html">Projects</a></li>
          <li><a href="assets/res2.pdf" target="_blank">Resume</a></li>
          <li class="active"><a href="blog.html">Blog</a></li>
        </ul>
        <ul class="icons">
          <li><a href="https://github.com/ishraklatif" target="_blank" class="icon brands fa-github"><span class="label">GitHub</span></a></li>
          <li><a href="https://www.linkedin.com/in/ishrak-latif-a79235212/" target="_blank" class="icon brands fa-linkedin"><span class="label">LinkedIn</span></a></li>
        </ul>
      </nav>

      <div id="main">
        <header class="major">
          <h1>Blog</h1>
          <p>Technical writeups, research notes, and thoughts on AI & software.</p>
        </header>

        <div id="posts-container">
          <div class="loading">Loading posts...</div>
        </div>
      </div>

      <footer id="footer">
        <section class="split contact">
          <section>
            <h3>Email</h3>
            <p><a href="mailto:ishrak.latif96@gmail.com">ishrak.latif96@gmail.com</a></p>
          </section>
          <section>
            <h3>Social</h3>
            <ul class="icons alt">
              <li><a href="https://www.linkedin.com/in/ishrak-latif-a79235212/" target="_blank" class="icon brands alt fa-linkedin"><span class="label">LinkedIn</span></a></li>
              <li><a href="https://github.com/ishraklatif" target="_blank" class="icon brands alt fa-github"><span class="label">GitHub</span></a></li>
            </ul>
          </section>
        </section>
      </footer>

      <div id="copyright">
        <ul><li>&copy; IL</li><li>Design: <a href="https://html5up.net">HTML5 UP</a></li></ul>
      </div>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
      const BACKEND = "https://portfolio-chatbot-backend-icy-fog-6801.fly.dev";

      function formatDate(iso) {
        return new Date(iso).toLocaleDateString("en-AU", {
          year: "numeric", month: "long", day: "numeric"
        });
      }

      async function loadPosts() {
        const container = document.getElementById("posts-container");
        try {
          const res = await fetch(`${BACKEND}/posts`);
          const posts = await res.json();

          if (!posts.length) {
            container.innerHTML = '<div class="no-posts"><p>No posts yet. Check back soon!</p></div>';
            return;
          }

          container.innerHTML = '<section class="posts">' +
            posts.map(post => `
              <article class="post-card">
                <header>
                  <div class="post-meta">
                    <span class="post-category">${post.category}</span> &nbsp;·&nbsp;
                    ${formatDate(post.created_at)}
                  </div>
                  <h2><a href="post.html?slug=${post.slug}">${post.title}</a></h2>
                </header>
                <p>${post.excerpt || ""}</p>
                <div>
                  ${(post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join("")}
                </div>
                <ul class="actions special">
                  <li><a href="post.html?slug=${post.slug}" class="button">Read More</a></li>
                </ul>
              </article>
            `).join("") +
          '</section>';
        } catch (err) {
          container.innerHTML = `<div class="no-posts"><p>Failed to load posts. Try again later.</p></div>`;
        }
      }

      loadPosts();
    </script>
  </body>
</html>
